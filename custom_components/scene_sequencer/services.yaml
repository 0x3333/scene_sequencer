cycle:
  description: "Activate the next scene for a configured sequencer entry. If off_scene is configured, cycle can transition to off_scene (including timeout behavior). If off_scene is not configured, it cycles through on_scenes continuously. Target by entry_id or by unique name."
  fields:
    entry_id:
      description: "Config entry ID for the sequencer to advance. If provided, it takes precedence over name."
      example: "01JABCDEF1234567890ABCDEF"
      selector:
        text:
    name:
      description: "Configured entry name for the sequencer to advance. Must match exactly and be unique across entries."
      example: "Bed"
      selector:
        text:

scene_on:
  description: "Ensure the sequencer is on. If currently off or unknown, activate the first on_scene. If already on an on_scene, do nothing. Target by entry_id or by unique name."
  fields:
    entry_id:
      description: "Config entry ID for the sequencer to target. If provided, it takes precedence over name."
      example: "01JABCDEF1234567890ABCDEF"
      selector:
        text:
    name:
      description: "Configured entry name for the sequencer to target. Must match exactly and be unique across entries."
      example: "Bed"
      selector:
        text:

scene_off:
  description: "Activate the configured off_scene for the sequencer. Requires off_scene to be configured for the target entry. Target by entry_id or by unique name."
  fields:
    entry_id:
      description: "Config entry ID for the sequencer to target. If provided, it takes precedence over name."
      example: "01JABCDEF1234567890ABCDEF"
      selector:
        text:
    name:
      description: "Configured entry name for the sequencer to target. Must match exactly and be unique across entries."
      example: "Bed"
      selector:
        text:
